    <style>
      :root {
        color-scheme: light;
        --page: #f8f7f3;
        --ink: #171717;
        --muted: #5f625e;
        --accent: #51624f;
        --accent-hover: #3f4f3e;
        --focus: #9a7049;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0) 34rem),
          var(--page);
        color: var(--ink);
        font-family:
          ui-serif,
          Georgia,
          Cambria,
          "Times New Roman",
          Times,
          serif;
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 3rem 1.25rem;
      }

      .intro {
        width: min(100%, 44rem);
        text-align: center;
      }

      .logo {
        display: block;
        width: min(100%, 18rem);
        height: auto;
        margin: 0 auto;
      }

      .description {
        max-width: 34rem;
        margin: 1.75rem auto 0;
        color: var(--muted);
        font-size: clamp(1.05rem, 1rem + 0.25vw, 1.2rem);
        line-height: 1.7;
      }

      .form-shell {
        width: min(100%, 34rem);
        margin: 2rem auto 0;
        text-align: left;
      }

      .back-link {
        display: inline-flex;
        margin-top: 1.75rem;
        color: var(--accent);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-size: 0.92rem;
        font-weight: 600;
        text-decoration: none;
      }

      .back-link:hover {
        color: var(--accent-hover);
        text-decoration: underline;
      }

      .back-link:focus-visible {
        outline: 3px solid var(--focus);
        outline-offset: 4px;
      }

      @media (max-width: 34rem) {
        main {
          align-items: start;
          padding-top: 4rem;
        }
      }
    </style>
    <script src="https://www.staticforms.dev/scripts/staticforms.js" defer></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        StaticForms.render(

        <div class="form-shell">
